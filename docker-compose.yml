services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pokemon-match-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokemon_match}
      POSTGRES_USER: ${POSTGRES_USER:-pokemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokemon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pokemon_match_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokemon} -d ${POSTGRES_DB:-pokemon_match}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pokemon_match_pgdata:
